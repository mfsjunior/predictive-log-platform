version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: plip-postgres
    environment:
      POSTGRES_DB: logplatform
      POSTGRES_USER: logadmin
      POSTGRES_PASSWORD: logadmin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U logadmin -d logplatform" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - logplatform-net

  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: plip-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
      - ./models:/models
    environment:
      MLFLOW_TRACKING_URI: "sqlite:///mlflow/mlflow.db"
    networks:
      - logplatform-net

  python-ml:
    build:
      context: ./python-ml-service
      dockerfile: Dockerfile
    container_name: plip-python-ml
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      DATABASE_URL: "postgresql://logadmin:logadmin123@postgres:5432/logplatform"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MODELS_DIR: "/app/models"
      DATA_DIR: "/app/data"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - logplatform-net

  java-api:
    build:
      context: ./java-api
      dockerfile: Dockerfile
    container_name: plip-java-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/logplatform"
      SPRING_DATASOURCE_USERNAME: logadmin
      SPRING_DATASOURCE_PASSWORD: logadmin123
      ML_SERVICE_URL: "http://python-ml:8000"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    depends_on:
      postgres:
        condition: service_healthy
      python-ml:
        condition: service_started
    networks:
      - logplatform-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: plip-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - logplatform-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: plip-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - logplatform-net

  redis:
    image: redis:7-alpine
    container_name: plip-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - logplatform-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: plip-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      java-api:
        condition: service_started
      python-ml:
        condition: service_started
    networks:
      - logplatform-net

  grafana:
    image: grafana/grafana:10.4.1
    container_name: plip-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/plip-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - logplatform-net

volumes:
  postgres_data:
  mlflow_data:
  grafana_data:


networks:
  logplatform-net:
    driver: bridge
